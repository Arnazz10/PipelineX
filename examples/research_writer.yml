name: research_writer
description: Research a topic and write a summary
version: "1.0"

agents:
  - id: researcher
    name: Research Agent
    model: gpt-4
    system_prompt: |
      You are a research assistant. Given a topic, search the web
      and provide key findings.
    tools:
      - web_search

  - id: writer
    name: Writer Agent
    model: gpt-4
    system_prompt: |
      You are a technical writer. Given research findings,
      write a concise summary.

edges:
  - from: researcher
    to: writer
    condition: always

input:
  - name: topic
    type: string
    required: true

output:
  - name: summary
    type: string